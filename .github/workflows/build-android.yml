name: Compilar APK de Android

# se dispara solo (cada vez que subes cambios a "main"), o a mano desde la
# pestaña "Actions" de GitHub con el botón "Run workflow"
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el código del repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Configurar Java (lo necesita Android)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Configurar el SDK de Android
        uses: android-actions/setup-android@v3

      - name: Instalar dependencias del proyecto
        run: npm install

      - name: Sincronizar Capacitor con el proyecto Android
        run: npx cap sync android

      - name: Dar permiso de ejecución a Gradle
        run: chmod +x android/gradlew

      - name: Compilar el APK (versión de prueba, "debug")
        run: cd android && ./gradlew assembleDebug --no-daemon

      - name: Guardar el APK como resultado descargable
        uses: actions/upload-artifact@v4
        with:
          name: zocial-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
